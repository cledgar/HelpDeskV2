<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic Metadata -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Desk - Login</title>
    <link rel="icon" href="/assets/images/favicon.png">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/login-page.css">
    <link rel="stylesheet" href="/css/footer.css">
</head>
<body class="landing-page">

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-inner">
            <div class="nav-logo">
                <img src="/assets/images/GeminiHelpDeskLogo-Picsart-BackgroundRemover.png" alt="Help Desk Logo" class="nav-logo-img">
                <span>Help Desk</span>
            </div>
            <div class="nav-links">
                <a href="/index.html" class="nav-link">Home</a>
                <a href="/pages/about.html" class="nav-link">About</a>
                <a href="/pages/faq.html" class="nav-link">FAQ</a>
            </div>
        </div>
    </nav>

    <main>
        <!-- Login Page Container -->
        <div id="login-container" class="login-container">
            <!-- Login Modal Box -->
            <div class="login-modal">
                <h2>Login</h2>
                
                <!-- Login Credentials Form -->
                <form id="login-form">
                    <label for="username">Username or Email:</label>
                    <input type="text" id="username" placeholder="Username or Email" required/>
                    
                    <label for="password">Password:</label>
                    <input type="password" id="password" placeholder="Password" required/>
                    
                    <!-- Placeholder for login error messages -->
                    <p id="error-msg" style="color:red; display:none;">Invalid credentials</p>
                    
                    <!-- Login/Signup/Forgot Password buttons -->
                    <div class="text-row">
                        <!-- Confirm Login -->
                        <div class="text-field">
                            <button class="form-buttons" type="submit">Login</button>
                        </div>
                        <!-- Link to Sign Up Page -->
                        <div class="text-field">
                            <button class="form-buttons" id="sign-up-button">Sign Up</button>
                        </div>
                    </div>
                    <!-- Link to forgot password form -->
                    <a href="/pages/forgot-pw.html" class="nav-link" style="align-self: center; padding: 8px;">Forgot Password?</a>

                </form>
            </div>
        </div>
    </main>

    <!-- Footer Component Insertion -->
    <div id="footer"></div>

    <!-- Login Authentication Logic -->
    <script type="module" src="/js/footer.js"></script>
    <script type="module" src="/js/supabase.js"></script>
    <script type="module" src="/js/login-page.js"></script>
</body>
</html>
